<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- This meta tag ensures that the website renders correctly across different device sizes, enhancing mobile responsiveness. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Link to the external CSS stylesheet. Uncomment if you wish to customize or add styling. -->
    <link rel="stylesheet" href="register.css">  

    <title>WasteNot</title>
</head>
<body>
    <div class="register-title">
        <h1 class="register-title-text">Create User</h1>
    </div>

    <div class="register-form">
        <form id ="createUserForm">
            <p>Name</p>
            <input type="text" id="new-user-name" placeholder="Name"> <br><br>

            <p>Address</p>
            <input type="text" id="new-user-address" placeholder="Address"> <br><br>

            <p>Email</p>
            <input type="text" id="new-user-email" placeholder="Email"> <br><br><br>

            <button type="submit" class="register-button">Register</button>
        </form>

        <p>Have an account? <a href="login.html">Log in here</a></p>
    </div>

    <!-- ===================================================================================== -->
    <!-- External JavaScript file that contains the functionality/logic for the operations above. -->
    <script src="notification.js"></script>
    <script src="scripts.js"></script>
    <script src="user.js"></script>
</body>
</html>
