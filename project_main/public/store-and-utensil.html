<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- This meta tag ensures that the website renders correctly across different device sizes, enhancing mobile responsiveness. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Link to the external CSS stylesheet. Uncomment if you wish to customize or add styling. -->
    <link rel="stylesheet" href="store-and-utensil.css">  

    <title>WasteNot</title>
</head>
<body>
    <header>
        <div><a href="user.html">
            User
        </a></div>
        <div><a href="ingredient-and-recipe.html">
            Ingredient and Recipe
        </a></div>
        <div><a href="nutrition.html">
            Nutrition
        </a></div>
        <div><a href="donation.html">
            Donation
        </a></div>
        <div><a href="store-and-utensil.html">
            Store and Utensil
        </a></div>
        <div><a href="complex-queries.html">
            Complex Queries
        </a></div>
    </header>

    <hr>

    <div class="utensil-section">
        <div class="add-utensil-section">
            <h1 class="add-utensil-title-text">Add Utensil</h1>
            <div class="add-utensil-form">
                <form>
                    <p>Name</p>
                    <input type="text" id="new-utensil-name" placeholder="Name"> <br><br>
        
                    <p>Material</p>
                    <input type="text" id="new-utensil-material" placeholder="e.g. Wood"> <br><br>

                    <p>Is Sustainable (yes/no) </p>
                    <input type="text" id="new-utensil-is-sustainable" placeholder="e.g. yes"> <br><br>
        
                    <button type="submit" class="add-utensil-button">Add utensil</button>
                </form>
            </div>
        </div>
        <div class="remove-utensil-section">
            <h1 class="remove-utensil-title-text">Remove Utensil</h1>
            <div class="remove-utensil-form">
                <form>
                    <p>Name</p>
                    <input type="text" id="del-utensil-name" placeholder="Name"> <br><br>

                    <p>Material</p>
                    <input type="text" id="del-utensil-material" placeholder="e.g. Wood"> <br><br>
        
                    <button type="submit" class="remove-utensil-button">Remove utensil</button>
                </form>
            </div>
        </div>
        <div class="list-utensil-section">
            <h1 class="list-utensil-title-text">Utensil List</h1>
            <div id="list-utensil-table"></div>
        </div>
    </div>

    <hr>

    <div class="store-section">
        <div class ="add-remove-store-section">
            <div class="add-store-section">
                <h1 class="add-store-title-text">Add Store</h1>
                <div class="add-store-form">
                    <form>
                        <p>Name</p>
                        <input type="text" id="new-store-name" placeholder="Name"> <br><br>
            
                        <p>Address</p>
                        <input type="text" id="new-store-address" placeholder="e.g. Indonesia"> <br><br>

                        <p>Contact</p>
                        <input type="text" id="new-store-contact" placeholder="e.g. Deep fried chicken wrapped with fluor."> <br><br>
            
                        <button type="submit" class="add-store-button">Add Store</button>
                    </form>
                </div>
            </div>
            <div class="remove-store-section">
                <h1 class="remove-store-title-text">Remove Store</h1>
                <div>
                    <form id="remove-store-form">
                        <p>Name</p>
                        <input type="text" id="del-store-name" placeholder="Name"> <br><br>

                        <p>Address</p>
                        <input type="text" id="del-store-address" placeholder="Name"> <br><br>
            
                        <button type="submit" class="remove-store-button">Remove Store</button>
                    </form>
                </div>
            </div>
        </div>
        <div class="list-store-section">
            <h1>Store List</h1>
            <div>
                <input type="checkbox" id="store-name-checkbox"> Name
                <input type="checkbox" name="" id="store-address-checkbox"> Address
                <input type="checkbox" name="" id="store-contact-checkbox"> Contact
            </div>
            <div>
                <button onclick="fetchAndDisplayStoreProjection()">Show Stores</button>
            </div>
            <table id="list-store-table">
                <thead></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <!-- ===================================================================================== -->
    <!-- External JavaScript file that contains the functionality/logic for the operations above. -->
    <script src="notification.js"></script>
    <script src="scripts.js"></script>
    <script src="store-and-utensil.js"></script>
</body>
</html>
